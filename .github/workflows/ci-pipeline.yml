name: DevOps Automation Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # Job 1: Verify Code Quality (CI)
  code-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Lint and Test Code
      run: |
        pip install -r requirements.txt
        python -m py_compile app.py

# Job 2: Build & Publish to Docker Hub (CD)
  build-and-push:
    runs-on: ubuntu-latest
    needs: code-test # Only run if tests pass!
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        registry: docker.io # <-- Explicitly tell it to use public Docker Hub
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        # Using docker.io/ prefix ensures the builder knows exactly where to push
        tags: |
          docker.io/mizanolinko/prod-app:latest
          docker.io/mizanolinko/prod-app:${{ github.sha }}