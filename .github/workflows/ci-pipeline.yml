name: DevOps Automation Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # Job 1: Verify Code Quality (CI)
  code-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Lint and Test Code
      run: |
        pip install -r requirements.txt
        python -m py_compile app.py

  # Job 2: Build & Publish to Docker Hub (CD)
  build-and-push:
    runs-on: ubuntu-latest
    needs: code-test # THIS IS CRITICAL: Do not run this job unless code-test passes successfully!
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        # Replace 'mizanolinko' with your actual Docker Hub username below
        tags: |
          ${{ secrets.mizanolinko }}/prod-app:latest
          ${{ secrets.mizanolinko }}/prod-app:${{ github.sha }}